site_name: SEO Autoblog Money
site_url: "https://pjgiraldob.github.io/seo-autoblog-money/"
repo_name: seo-autoblog-money
repo_url: https://github.com/pjgiraldob/seo-autoblog-money
site_description: Modern tech platform for automation, AI tools, and SEO workflows.
site_author: SEO Autoblog Money
use_directory_urls: true

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: assets/brand-mark.svg
  favicon: assets/brand-mark.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      separator: '[\\s\\-]+'

nav:
  - Home: index.md
  - Articles:
    - Overview: posts/index.md
  - Automation Guides:
    - Hub: guides/index.md
    - Pillar Guide: guides/guia-pilar-seo-para-creadores.md
  - Recommended Tools:
    - Reviews: reviews/index.md
  - Newsletter: newsletter/index.md

extra:
  generator: false
  social_image: assets/og-cover.svg
  x_url: https://x.com
  linkedin_url: https://linkedin.com
  github_url: https://github.com/pjgiraldob/seo-autoblog-money

extra_css:
  - assets/styles.css
  - styles/modern.css

extra_javascript:
  - javascripts/modern.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
