{% extends "main.html" %}

{% block content %}
  <script>
    (function () {
      var path = window.location.pathname;
      if (path.endsWith('.md')) {
        var fixed = path.replace(/\.md$/, '/');
        if (window.location.search) {
          fixed += window.location.search;
        }
        if (window.location.hash) {
          fixed += window.location.hash;
        }
        window.location.replace(fixed);
        return;
      }
    })();
  </script>
  {{ super() }}
{% endblock %}
